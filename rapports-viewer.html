<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELGMAP - Rapports Hebdomadaires</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #cbd5e1;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Markdown Styles */
        .markdown-body h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .markdown-body h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #f8fafc;
            margin-top: 2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .markdown-body h3 {
            font-size: 1.25rem;
            font-weight: 500;
            color: #e2e8f0;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .markdown-body p {
            margin-bottom: 1rem;
            line-height: 1.7;
        }
        .markdown-body ul {
            list-style: none;
            padding-left: 0;
            margin-bottom: 1.5rem;
        }
        .markdown-body li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .markdown-body li::before {
            content: '✦';
            position: absolute;
            left: 0;
            color: #818cf8;
            font-size: 1.1rem;
            top: -2px;
        }
        .markdown-body strong {
            color: #a5b4fc;
            font-weight: 600;
        }
        .markdown-body hr {
            border-color: rgba(255, 255, 255, 0.1);
            margin: 2rem 0;
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col sm:flex-row justify-between items-center mb-10 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-[0_0_20px_rgba(168,85,247,0.4)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">Timeline de Développement</h1>
                    <p class="text-slate-400 text-sm uppercase tracking-widest">Rapports Visuels</p>
                </div>
            </div>

            <!-- Upload Button (for local file reading) -->
            <div>
                <label for="file-upload" class="cursor-pointer bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white px-5 py-2.5 rounded-full text-sm font-medium transition-colors flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Charger RAPPORT.md
                </label>
                <input id="file-upload" type="file" accept=".md" class="hidden" onchange="handleFileUpload(event)">
            </div>
        </header>

        <!-- Timeline Container -->
        <div class="relative">
            <!-- Vertical Line -->
            <div class="absolute left-6 top-0 bottom-0 w-px bg-gradient-to-b from-indigo-500/50 to-transparent"></div>

            <!-- Report Card -->
            <div id="report-container" class="hidden relative pl-16 pb-12">
                <!-- Node -->
                <div class="absolute left-[21px] top-8 w-4 h-4 rounded-full bg-slate-900 border-2 border-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.8)]"></div>
                
                <!-- Content -->
                <div class="glass-panel rounded-3xl p-8">
                    <div id="markdown-content" class="markdown-body">
                        <!-- Parsed Markdown will go here -->
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="pl-16 pt-8 text-slate-500 italic">
                Aucun rapport chargé. Cliquez sur le bouton en haut à droite pour charger votre fichier RAPPORT.md.
            </div>
        </div>
    </div>

    <script>
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                
                // Parse markdown
                document.getElementById('markdown-content').innerHTML = marked.parse(content);
                
                // Show container
                document.getElementById('report-container').classList.remove('hidden');
                document.getElementById('empty-state').classList.add('hidden');
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
